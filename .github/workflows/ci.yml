name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Configure git for HTTPS (public deps)
        run: git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
      - run: npm ci
      - run: npm run lint

  type-check:
    name: type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Configure git for HTTPS (public deps)
        run: git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
      - run: npm ci
      - run: npm run type-check

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Configure git for HTTPS (public deps)
        run: git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
      - run: npm ci
      - run: npm run build

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Configure git for HTTPS (public deps)
        run: git config --global url."https://github.com/".insteadOf "git+ssh://git@github.com/"
      - run: npm ci
      - run: npm test
