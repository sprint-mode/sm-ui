name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@sprint-mode"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build standalone bundles
        run: npm run build:standalone

      - name: Resolve publish version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          LAST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -1 || echo "")

          if [ -z "$LAST_TAG" ]; then
            # No tags yet — publish current version as-is
            PUBLISH_VERSION="$CURRENT"
          else
            LAST_VERSION="${LAST_TAG#v}"
            # Use package.json ONLY if it is strictly ahead of the latest tag
            # (author intentionally bumped minor/major). Otherwise auto-bump the
            # patch from the latest published tag. This is correct even when
            # package.json trails the tag (the common case, since the version is
            # never committed back after an auto-bump) — the old "!=" check
            # published the stale package.json version and 409'd.
            PUBLISH_VERSION=$(node -p "
              const cur = '$CURRENT'.split('.').map(Number);
              const last = '$LAST_VERSION'.split('.').map(Number);
              const ahead =
                cur[0] > last[0] ||
                (cur[0] === last[0] && cur[1] > last[1]) ||
                (cur[0] === last[0] && cur[1] === last[1] && cur[2] > last[2]);
              ahead ? cur.join('.') : [last[0], last[1], last[2] + 1].join('.');
            ")
          fi

          echo "publish_version=$PUBLISH_VERSION" >> $GITHUB_OUTPUT
          echo "Resolved publish version: $PUBLISH_VERSION"

      - name: Set version for publish
        run: |
          VERSION="${{ steps.version.outputs.publish_version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "package.json version set to $VERSION (not committed to main)"

      - name: Tag release
        run: |
          VERSION="${{ steps.version.outputs.publish_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "v${VERSION}"
          git push origin "v${VERSION}" --force

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
