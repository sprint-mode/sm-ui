name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@sprint-mode"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Auto-bump patch version
        id: version
        run: |
          # Read current version from package.json
          CURRENT=$(node -p "require('./package.json').version")
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          # Check if this commit already set a specific version (manual minor/major bump)
          # by comparing to the last published tag
          LAST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -1 || echo "")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

          if [ -z "$LAST_TAG" ]; then
            # No tags yet — first publish, use package.json version as-is
            echo "bumped=$CURRENT" >> $GITHUB_OUTPUT
            echo "skip_bump=true" >> $GITHUB_OUTPUT
          else
            LAST_VERSION=${LAST_TAG#v}
            if [ "$CURRENT" != "$LAST_VERSION" ]; then
              # PR author explicitly set a new version — use it as-is (minor/major bump)
              echo "bumped=$CURRENT" >> $GITHUB_OUTPUT
              echo "skip_bump=true" >> $GITHUB_OUTPUT
            else
              # Auto-bump patch
              BUMPED=$(node -p "
                const [maj, min, pat] = '$CURRENT'.split('.').map(Number);
                \`\${maj}.\${min}.\${pat + 1}\`
              ")
              echo "bumped=$BUMPED" >> $GITHUB_OUTPUT
              echo "skip_bump=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Write bumped version to package.json
        if: steps.version.outputs.skip_bump == 'false'
        run: |
          BUMPED="${{ steps.version.outputs.bumped }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = '$BUMPED';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit version bump
        if: steps.version.outputs.skip_bump == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.bumped }} [skip ci]"
          git push

      - name: Tag release
        run: |
          BUMPED="${{ steps.version.outputs.bumped }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${BUMPED}"
          git push origin "v${BUMPED}"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
